<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام إدارة المتجر - إدارة عملاء البقالة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase SDK v9 compat -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            direction: rtl;
            color: #1e293b;
            line-height: 1.5;
        }

        :root {
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
            --info-color: #3b82f6;
            --light-color: #f8fafc;
            --dark-color: #1e293b;
            --gray-color: #64748b;
            --border-radius: 12px;
            --box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 1rem;
        }

        header {
            background: white;
            border-bottom: 2px solid #667eea;
            padding: 0.5rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.1);
            min-height: 60px;
            display: flex;
            align-items: center;
        }

        .header-content {
            width: 100%;
            padding: 0 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .app-info {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            justify-content: center;
            margin-bottom: 5px;
        }

        .app-logo {
            width: 35px;
            height: 35px;
            border-radius: 8px;
            overflow: hidden;
            background: white;
            padding: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .app-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .app-name {
            font-size: 16px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .merchant-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
        }

        .management-name {
            font-size: 14px;
            color: #f59e0b;
            font-weight: 600;
            margin-bottom: 2px;
        }

        /* الأزرار العائمة */
        .floating-buttons {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 1000;
        }

        .floating-save-button {
            background: rgba(16, 185, 129, 0.9);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 22px;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .floating-save-button:hover {
            background: rgba(5, 150, 105, 0.9);
            transform: scale(1.1);
        }

        .floating-save-button.hidden {
            display: none;
        }

        .floating-back-button {
            background: rgba(102, 126, 234, 0.9);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 22px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            text-decoration: none;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .floating-back-button:hover {
            background: rgba(118, 75, 162, 0.9);
            transform: scale(1.1);
        }

        /* التبويبات */
        .tabs {
            display: flex;
            justify-content: center;
            padding: 4rem 1rem 0;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(102, 126, 234, 0.1);
            color: var(--primary-color);
            border: 2px solid #667eea;
            padding: 0.6rem 1.2rem;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 14px;
        }

        .tab-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .tab-content {
            display: none;
            padding: 1.5rem;
            max-width: 100%;
            margin: 0 auto;
        }

        .tab-content.active {
            display: block;
        }

        /* نموذج العملاء */
        .form-section {
            background: white;
            border-radius: var(--border-radius);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.1);
            border: 2px solid #667eea;
        }

        .form-section h3 {
            margin-bottom: 1.2rem;
            color: var(--dark-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.2rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            color: var(--dark-color);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e2e8f0;
            border-radius: var(--border-radius);
            font-size: 14px;
            transition: var(--transition);
            background: #f8fafc;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input[readonly] {
            background-color: #f1f5f9;
            color: #64748b;
            cursor: not-allowed;
        }

        /* عرض العملاء */
        .customers-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            padding: 1rem;
        }

        .customer-card {
            background: white;
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.1);
            transition: var(--transition);
            border: 2px solid #667eea;
            display: flex;
            flex-direction: column;
        }

        .customer-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.2);
        }

        .customer-info {
            padding: 1.2rem;
            flex: 1;
        }

        .customer-id {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 2px dashed #e2e8f0;
            padding-bottom: 0.5rem;
        }

        .customer-name {
            font-size: 1rem;
            font-weight: 600;
            color: var(--dark-color);
            margin: 0.5rem 0;
        }

        .customer-detail {
            font-size: 0.85rem;
            color: var(--gray-color);
            margin-bottom: 0.4rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            word-break: break-word;
        }

        .customer-amount {
            font-size: 1rem;
            font-weight: 700;
            color: var(--success-color);
            margin-top: 0.5rem;
            background: #f0fdf4;
            padding: 0.3rem 0.6rem;
            border-radius: 20px;
            display: inline-block;
        }

        .customer-actions {
            display: flex;
            gap: 0.8rem;
            padding: 1rem;
            justify-content: center;
            border-top: 1px solid #e2e8f0;
            background: #fafcff;
        }

        .action-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            font-size: 16px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        .edit-btn {
            background: linear-gradient(135deg, var(--info-color), #2563eb);
            color: white;
        }

        .delete-btn {
            background: linear-gradient(135deg, var(--danger-color), #dc2626);
            color: white;
        }

        .no-data {
            text-align: center;
            padding: 3rem 1.5rem;
            color: var(--gray-color);
            grid-column: 1 / -1;
        }

        .no-data i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.6;
        }

        /* التنبيهات */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .toast {
            padding: 12px 16px;
            border-radius: 12px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-width: 280px;
            max-width: 90vw;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            animation: slideIn 0.3s ease;
            backdrop-filter: blur(5px);
        }
        
        .toast.success { background: rgba(76, 175, 80, 0.9); }
        .toast.error { background: rgba(244, 67, 54, 0.9); }
        .toast.warning { background: rgba(255, 152, 0, 0.9); }
        .toast.info { background: rgba(33, 150, 243, 0.9); }
        
        .toast-content {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .toast-close {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }
        
        .toast-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: rgba(255,255,255,0.5);
            width: 100%;
            border-radius: 0 0 12px 12px;
            overflow: hidden;
        }
        
        .toast-progress-bar {
            height: 100%;
            background: white;
            animation: progressBar 5s linear forwards;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes progressBar {
            from { width: 100%; }
            to { width: 0%; }
        }

        /* نافذة تأكيد الحذف */
        .confirm-dialog {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            display: none;
        }

        .confirm-content {
            background: white;
            padding: 1.5rem;
            border-radius: var(--border-radius);
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .confirm-buttons {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            margin-top: 1.2rem;
        }

        .btn-secondary {
            background: #f1f5f9;
            color: var(--dark-color);
            border: 2px solid #e2e8f0;
            padding: 0.6rem 1.2rem;
            border-radius: var(--border-radius);
            cursor: pointer;
        }

        .btn-danger {
            background: var(--danger-color);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: var(--border-radius);
            cursor: pointer;
        }

        /* تحميل */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            display: none;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .tabs { padding-top: 3rem; flex-direction: column; }
            .tab-btn { width: 100%; justify-content: center; }
            .customers-container { grid-template-columns: 1fr; }
            .floating-buttons { right: 10px; }
            .floating-save-button, .floating-back-button { width: 50px; height: 50px; font-size: 20px; }
        }

        .hidden { display: none !important; }
        .real-time-badge { font-size: 12px; background: #10b981; padding: 2px 6px; border-radius: 20px; margin-right: 8px; color: white; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div class="header-content">
            <div class="app-info">
                <div class="app-logo">
                    <img src="https://github.com/e772299420-hue/Call/raw/main/BackgroundEraser_%D9%A2%D9%A0%D9%A2%D9%A5%D9%A0%D9%A9%D9%A0%D9%A5_%D9%A0%D9%A0%D9%A3%D9%A5%D9%A0%D9%A1%D9%A0%D9%A0%D9%A7.png" alt="شعار AZ السوق الشامل">
                </div>
                <div class="app-name">AZ السوق الشامل</div>
            </div>
            <div class="merchant-section">
                <div class="management-name">إدارة عملاء البقالة</div>
            </div>
        </div>
    </header>

    <div class="floating-buttons">
        <button class="floating-save-button" id="floatingSaveBtn">
            <i class="fas fa-save"></i>
        </button>
        <a href="manjr_tagr_snf.html" class="floating-back-button">
            <i class="fas fa-arrow-right"></i>
        </a>
    </div>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" data-tab="add-customer-tab">
                <i class="fas fa-user-plus"></i> إضافة عميل
            </button>
            <button class="tab-btn" data-tab="view-customers-tab">
                <i class="fas fa-users"></i> عرض العملاء
                <span class="real-time-badge" id="liveBadge" style="display: none;">مباشر</span>
            </button>
        </div>

        <!-- تبويب إضافة عميل -->
        <div id="add-customer-tab" class="tab-content active">
            <div class="form-section">
                <h3><i class="fas fa-store"></i> بيانات العميل الجديد</h3>
                <form id="customerForm">
                    <div class="form-group">
                        <label for="customerId"><i class="fas fa-id-badge"></i> رقم العميل (تسلسلي)</label>
                        <input type="number" id="customerId" readonly placeholder="سيتم إنشاؤه تلقائياً">
                    </div>
                    <div class="form-group">
                        <label for="customerName"><i class="fas fa-user"></i> اسم العميل *</label>
                        <input type="text" id="customerName" required placeholder="أدخل الاسم الكامل">
                    </div>
                    <div class="form-group">
                        <label for="customerAddress"><i class="fas fa-location-dot"></i> العنوان *</label>
                        <input type="text" id="customerAddress" required placeholder="العنوان بالتفصيل">
                    </div>
                    <div class="form-group">
                        <label for="customerMobile"><i class="fas fa-phone"></i> رقم الجوال *</label>
                        <input type="tel" id="customerMobile" required placeholder="05xxxxxxxx" pattern="[0-9]{10,15}">
                    </div>
                    <div class="form-group">
                        <label for="customerAmount"><i class="fas fa-money-bill-wave"></i> المبلغ المستحق / المدفوع *</label>
                        <input type="number" id="customerAmount" required step="0.01" min="0" placeholder="0.00">
                    </div>
                    <small style="color: var(--gray-color);"><i class="fas fa-info-circle"></i> الحقول التي تحمل علامة * إجبارية</small>
                </form>
            </div>
        </div>

        <!-- تبويب عرض العملاء -->
        <div id="view-customers-tab" class="tab-content">
            <div class="form-section">
                <h3><i class="fas fa-users"></i> قائمة العملاء</h3>
                <div id="customersListContainer" class="customers-container">
                    <div class="no-data"><i class="fas fa-spinner fa-spin"></i><p>جاري تحميل العملاء...</p></div>
                </div>
            </div>
        </div>
    </div>

    <!-- نافذة تأكيد الحذف -->
    <div class="confirm-dialog" id="deleteDialog">
        <div class="confirm-content">
            <h3><i class="fas fa-exclamation-triangle"></i> تأكيد الحذف</h3>
            <p>هل أنت متأكد من حذف هذا العميل؟</p>
            <p>لا يمكن التراجع عن هذا الإجراء.</p>
            <div class="confirm-buttons">
                <button class="btn-secondary" id="cancelDeleteBtn">إلغاء</button>
                <button class="btn-danger" id="confirmDeleteBtn">نعم، احذف</button>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="globalLoading"><div class="loading-spinner"></div></div>
    <div class="toast-container" id="toastContainer"></div>
</div>

<script>
    // ========== إعداد Firebase بشكل صحيح ==========
    // ملاحظة: تحتاج إلى توفير كامل بيانات المشروع، ولكن بما أنك تستخدم قاعدة بيانات عامة، سنستخدم التهيئة الصحيحة
    const firebaseConfig = {
        apiKey: "AIzaSyDummyKeyForPublicDatabase",  // يمكن استخدام أي قيمة مؤقتة لأن قاعدة البيانات عامة
        authDomain: "chat-fat-free.firebaseapp.com",
        databaseURL: "https://chat-fat-free-default-rtdb.firebaseio.com/",
        projectId: "chat-fat-free",
        storageBucket: "chat-fat-free.appspot.com",
        messagingSenderId: "123456789",
        appId: "1:123456789:web:abcdef"
    };
    
    let database;
    try {
        // التحقق مما إذا كان Firebase مهيأ بالفعل
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        database = firebase.database();
        console.log("✅ Firebase initialized successfully");
    } catch(e) {
        console.error("Firebase init error", e);
        alert("خطأ في تهيئة قاعدة البيانات. تأكد من إعدادات Firebase.");
    }

    // ========== دوال مساعدة ==========
    function showToast(msg, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';
        toast.innerHTML = `
            <div class="toast-content"><i class="fas ${icon}"></i><span>${msg}</span></div>
            <button class="toast-close"><i class="fas fa-times"></i></button>
            <div class="toast-progress"><div class="toast-progress-bar"></div></div>
        `;
        container.appendChild(toast);
        const closeBtn = toast.querySelector('.toast-close');
        closeBtn.onclick = () => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); };
        setTimeout(() => { if(toast.parentNode) { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); } }, 5000);
    }

    function showLoading(show) {
        const loader = document.getElementById('globalLoading');
        if (loader) loader.style.display = show ? 'flex' : 'none';
    }

    // ========== مسارات قاعدة البيانات ==========
    const DB_CUSTOMERS = "grocery_customers";
    const DB_COUNTER = "grocery_customers_counter";

    let allCustomers = [];
    let customersListener = null;
    let isEditMode = false;
    let currentEditKey = null;
    let currentEditId = null;
    let customerToDeleteKey = null;

    // ========== الحصول على الرقم التسلسلي التالي ==========
    async function getNextCustomerId() {
        if (!database) return 1;
        const counterRef = database.ref(DB_COUNTER);
        let newId;
        await counterRef.transaction(current => {
            if (current === null) current = 0;
            newId = current + 1;
            return newId;
        });
        return newId;
    }

    // تحديث حقل معاينة الرقم
    async function updateCustomerIdPreview() {
        if (!database) return;
        const nextId = await getNextCustomerId();
        document.getElementById('customerId').value = nextId;
    }

    // ========== حفظ عميل (إضافة أو تعديل) ==========
    async function saveCustomer() {
        if (!database) { showToast("قاعدة البيانات غير جاهزة", "error"); return; }
        
        const name = document.getElementById('customerName').value.trim();
        const address = document.getElementById('customerAddress').value.trim();
        const mobile = document.getElementById('customerMobile').value.trim();
        const amount = parseFloat(document.getElementById('customerAmount').value);
        
        if (!name) { showToast('يرجى إدخال اسم العميل', 'warning'); return; }
        if (!address) { showToast('يرجى إدخال العنوان', 'warning'); return; }
        if (!mobile) { showToast('يرجى إدخال رقم الجوال', 'warning'); return; }
        if (isNaN(amount) || amount < 0) { showToast('المبلغ يجب أن يكون رقماً موجباً', 'warning'); return; }
        if (!/^[0-9]{9,15}$/.test(mobile.replace(/\s/g, ''))) { showToast('رقم الجوال يجب أن يحتوي على 9-15 رقم', 'warning'); return; }
        
        showLoading(true);
        try {
            if (isEditMode && currentEditKey) {
                // تعديل
                const updateData = {
                    name, address, mobile, amount,
                    updatedAt: Date.now()
                };
                await database.ref(`${DB_CUSTOMERS}/${currentEditKey}`).update(updateData);
                showToast(`تم تحديث العميل رقم ${currentEditId} بنجاح`, 'success');
                resetFormAndExitEdit();
            } else {
                // إضافة جديدة
                const newId = await getNextCustomerId();
                const newCustomer = {
                    customerId: newId,
                    name, address, mobile, amount,
                    createdAt: Date.now(),
                    updatedAt: Date.now()
                };
                await database.ref(DB_CUSTOMERS).push(newCustomer);
                showToast(`تم إضافة العميل رقم ${newId} بنجاح`, 'success');
                resetForm();
                await updateCustomerIdPreview();
            }
            // الانتقال إلى تبويب العرض
            switchTab('view-customers-tab');
        } catch (err) {
            console.error(err);
            showToast('خطأ في الحفظ: ' + err.message, 'error');
        } finally {
            showLoading(false);
        }
    }

    function resetForm() {
        document.getElementById('customerForm').reset();
        document.getElementById('customerId').value = '';
        isEditMode = false;
        currentEditKey = null;
        currentEditId = null;
        updateCustomerIdPreview();
    }

    function resetFormAndExitEdit() {
        resetForm();
    }

    // ========== تعديل عميل ==========
    function editCustomer(customer) {
        isEditMode = true;
        currentEditKey = customer.dbKey;
        currentEditId = customer.customerId;
        document.getElementById('customerId').value = customer.customerId;
        document.getElementById('customerName').value = customer.name;
        document.getElementById('customerAddress').value = customer.address;
        document.getElementById('customerMobile').value = customer.mobile;
        document.getElementById('customerAmount').value = customer.amount;
        switchTab('add-customer-tab');
        showToast('قم بتعديل البيانات ثم اضغط زر الحفظ', 'info');
    }

    // ========== حذف عميل ==========
    function confirmDeleteCustomer(dbKey) {
        customerToDeleteKey = dbKey;
        document.getElementById('deleteDialog').style.display = 'flex';
    }

    async function deleteCustomer() {
        if (!customerToDeleteKey) return;
        showLoading(true);
        try {
            await database.ref(`${DB_CUSTOMERS}/${customerToDeleteKey}`).remove();
            showToast('تم حذف العميل بنجاح', 'success');
            document.getElementById('deleteDialog').style.display = 'none';
            customerToDeleteKey = null;
        } catch (err) {
            showToast('فشل الحذف: ' + err.message, 'error');
        } finally {
            showLoading(false);
        }
    }

    // ========== عرض العملاء ==========
    function renderCustomers(customersArray) {
        const container = document.getElementById('customersListContainer');
        if (!container) return;
        if (!customersArray.length) {
            container.innerHTML = `<div class="no-data"><i class="fas fa-user-slash"></i><p>لا يوجد عملاء حتى الآن</p><p>أضف عميلاً جديداً من التبويب الأول</p></div>`;
            return;
        }
        container.innerHTML = '';
        customersArray.forEach(cust => {
            const card = document.createElement('div');
            card.className = 'customer-card';
            card.innerHTML = `
                <div class="customer-info">
                    <div class="customer-id"><i class="fas fa-hashtag"></i> رقم العميل: ${cust.customerId}</div>
                    <div class="customer-name"><i class="fas fa-user-circle"></i> ${escapeHtml(cust.name)}</div>
                    <div class="customer-detail"><i class="fas fa-location-dot"></i> ${escapeHtml(cust.address)}</div>
                    <div class="customer-detail"><i class="fas fa-phone"></i> ${escapeHtml(cust.mobile)}</div>
                    <div class="customer-amount"><i class="fas fa-coins"></i> المبلغ: ${Number(cust.amount).toFixed(2)} ر.س</div>
                </div>
                <div class="customer-actions">
                    <button class="action-btn edit-btn" data-key="${cust.dbKey}" title="تعديل"><i class="fas fa-edit"></i></button>
                    <button class="action-btn delete-btn" data-key="${cust.dbKey}" title="حذف"><i class="fas fa-trash"></i></button>
                </div>
            `;
            const editBtn = card.querySelector('.edit-btn');
            editBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                editCustomer(cust);
            });
            const delBtn = card.querySelector('.delete-btn');
            delBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                confirmDeleteCustomer(cust.dbKey);
            });
            container.appendChild(card);
        });
    }

    function escapeHtml(str) {
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ========== تحميل العملاء (مستمع مباشر) ==========
    function loadCustomersRealtime() {
        if (!database) return;
        if (customersListener) {
            database.ref(DB_CUSTOMERS).off('value', customersListener);
        }
        customersListener = database.ref(DB_CUSTOMERS).on('value', (snapshot) => {
            const data = snapshot.val() || {};
            const customersArray = [];
            for (let key in data) {
                const cust = data[key];
                if (cust && cust.customerId !== undefined) {
                    customersArray.push({ ...cust, dbKey: key });
                }
            }
            customersArray.sort((a,b) => a.customerId - b.customerId);
            allCustomers = customersArray;
            renderCustomers(allCustomers);
            const badge = document.getElementById('liveBadge');
            if (badge && customersArray.length > 0) badge.style.display = 'inline-flex';
            else if (badge) badge.style.display = 'none';
        }, (error) => {
            console.error("خطأ في الاستماع:", error);
            showToast("فشل تحميل العملاء: " + error.message, "error");
        });
    }

    // ========== التبديل بين التبويبات ==========
    function switchTab(tabName) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        const activeBtn = document.querySelector(`[data-tab="${tabName}"]`);
        if (activeBtn) activeBtn.classList.add('active');
        const activeContent = document.getElementById(tabName);
        if (activeContent) activeContent.classList.add('active');

        if (tabName === 'add-customer-tab') {
            document.getElementById('floatingSaveBtn').classList.remove('hidden');
            if (!isEditMode) resetForm();
            updateCustomerIdPreview();
        } 
        else if (tabName === 'view-customers-tab') {
            document.getElementById('floatingSaveBtn').classList.add('hidden');
            // التأكد من تحميل العملاء
            if (!customersListener) loadCustomersRealtime();
            else {
                // إعادة عرض آخر البيانات
                renderCustomers(allCustomers);
            }
        }
    }

    // ========== تهيئة العداد ==========
    async function initCounter() {
        if (!database) return;
        const counterRef = database.ref(DB_COUNTER);
        const snapshot = await counterRef.once('value');
        if (!snapshot.exists()) {
            // حساب أقصى رقم موجود
            const customersSnap = await database.ref(DB_CUSTOMERS).once('value');
            let maxId = 0;
            if (customersSnap.exists()) {
                Object.values(customersSnap.val()).forEach(c => {
                    if (c.customerId && c.customerId > maxId) maxId = c.customerId;
                });
            }
            await counterRef.set(maxId);
        }
    }

    // ========== بدء التشغيل ==========
    document.addEventListener('DOMContentLoaded', async () => {
        if (!database) {
            showToast("فشل الاتصال بقاعدة البيانات", "error");
            return;
        }
        await initCounter();
        await updateCustomerIdPreview();
        
        // أحداث التبويبات
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.getAttribute('data-tab');
                switchTab(tab);
            });
        });
        
        document.getElementById('floatingSaveBtn').addEventListener('click', saveCustomer);
        document.getElementById('cancelDeleteBtn').addEventListener('click', () => {
            document.getElementById('deleteDialog').style.display = 'none';
            customerToDeleteKey = null;
        });
        document.getElementById('confirmDeleteBtn').addEventListener('click', deleteCustomer);
        
        // بدء تحميل العملاء
        loadCustomersRealtime();
        
        showToast("مرحباً بك في إدارة عملاء البقالة", "info");
    });
</script>
</body>
