<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>الدفتر الذكي - إدخال المبلغ والملاحظات بالصوت</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Tahoma', 'Cairo', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(2px);
            border-radius: 3rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35), 0 4px 12px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 650px;
            padding: 2rem 2rem 2.5rem;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.6);
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1f2b3c, #2a3f5e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 0.4rem;
            letter-spacing: -0.3px;
        }

        .sub {
            text-align: center;
            color: #4a5b6e;
            margin-bottom: 2rem;
            font-size: 0.9rem;
            border-bottom: 1px dashed #cbd5e1;
            padding-bottom: 0.75rem;
        }

        .input-group {
            margin-bottom: 1.8rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-label {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-weight: 600;
            color: #1e2f3e;
            font-size: 1rem;
            background: #f1f5f9;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            width: fit-content;
        }

        .input-field {
            width: 100%;
            padding: 1rem 1.2rem;
            font-size: 1.1rem;
            border: 2px solid #e2e8f0;
            border-radius: 2rem;
            background-color: white;
            transition: all 0.2s;
            outline: none;
            font-weight: 500;
            color: #0f172a;
        }

        .input-field:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }

        textarea.input-field {
            resize: vertical;
            min-height: 95px;
            font-family: inherit;
        }

        .mic-button {
            background: linear-gradient(125deg, #0f2b3d, #1c4e6f);
            border: none;
            width: 100%;
            padding: 1rem;
            border-radius: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            color: white;
            font-size: 1.25rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 10px 18px -8px rgba(0,0,0,0.3);
            margin-bottom: 1rem;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .mic-button:hover:not(:disabled) {
            background: linear-gradient(125deg, #1c4058, #22668d);
            transform: scale(0.98);
        }

        .mic-button:active:not(:disabled) {
            transform: scale(0.96);
        }

        .mic-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .listening-badge {
            background: #fee2e2;
            color: #b91c1c;
            border-radius: 80px;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
            width: auto;
            backdrop-filter: blur(2px);
        }

        .status-area {
            display: flex;
            justify-content: center;
            margin-top: 0.5rem;
            margin-bottom: 1rem;
        }

        .transcript-box {
            background: #f8fafc;
            border-radius: 1.5rem;
            padding: 0.9rem 1.2rem;
            margin: 1.2rem 0 1rem;
            border-right: 5px solid #3b82f6;
            font-size: 0.95rem;
            color: #1e293b;
            word-break: break-word;
            box-shadow: inset 0 1px 3px #0001, 0 1px 2px #fff8;
        }

        .transcript-label {
            font-weight: 700;
            color: #2563eb;
            display: block;
            margin-bottom: 6px;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .btn-secondary {
            background: #eef2ff;
            border: none;
            padding: 0.7rem 1.2rem;
            border-radius: 2rem;
            font-weight: 600;
            color: #1e40af;
            cursor: pointer;
            flex: 1;
            transition: 0.1s;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }

        .btn-secondary:hover {
            background: #e0e7ff;
        }

        hr {
            margin: 1.2rem 0;
            border-color: #e2edff;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            color: #5f6c80;
            margin-top: 2rem;
        }

        @media (max-width: 550px) {
            .glass-card {
                padding: 1.5rem;
            }
            h1 {
                font-size: 1.5rem;
            }
            .mic-button {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="glass-card">
    <h1>🎙️ سجّل بصوتك</h1>
    <div class="sub">تحدّث بالعربية .. يملأ الحقول تلقائياً</div>

    <!-- حقل المبلغ -->
    <div class="input-group">
        <div class="input-label">
            <span>💰</span>
            <span>المبلغ (ريال)</span>
        </div>
        <input type="number" id="amountInput" class="input-field" placeholder="مثال: 1000" step="any" inputmode="decimal">
    </div>

    <!-- حقل الملاحظات -->
    <div class="input-group">
        <div class="input-label">
            <span>📝</span>
            <span>الملاحظات</span>
        </div>
        <textarea id="notesInput" class="input-field" placeholder="مثال: مقابل ماء وسجارة، غداء، فواتير ..."></textarea>
    </div>

    <!-- زر المايك الرئيسي -->
    <button id="micBtn" class="mic-button">
        <span class="mic-icon">🎤</span>
        <span>إضغط وتحدث (مايك)</span>
    </button>

    <!-- منطقة الحالة والنص المستمع -->
    <div class="status-area" id="statusArea"></div>
    <div class="transcript-box" id="transcriptArea">
        <span class="transcript-label">📢 النص الذي تم التعرف عليه :</span>
        <span id="recognizedText">—</span>
    </div>

    <!-- أزرار مساعدة -->
    <div class="action-buttons">
        <button id="clearBtn" class="btn-secondary">🧹 مسح الحقول</button>
        <button id="exampleBtn" class="btn-secondary">📋 مثال توضيحي</button>
    </div>
    <footer>
        ⚡ يدعم الأرقام المنطوقة (ألف، خمسمائة، ثلاثين، إلخ) واستخراج الملاحظات تلقائياً
        <br>
        🎙️ تأكد من منح صلاحية الميكروفون للمتصفح عند ظهور الطلب.
    </footer>
</div>

<script>
    (function() {
        // ----------------------------------------------
        // 1. قاموس تحويل الكلمات العربية إلى قيم رقمية
        // ----------------------------------------------
        const wordToNumber = new Map();

        // آحاد
        wordToNumber.set('واحد', 1); wordToNumber.set('واحدة', 1);
        wordToNumber.set('اثنان', 2); wordToNumber.set('اثنين', 2);
        wordToNumber.set('ثلاثة', 3); wordToNumber.set('ثلاث', 3);
        wordToNumber.set('أربعة', 4); wordToNumber.set('أربع', 4);
        wordToNumber.set('خمسة', 5); wordToNumber.set('خمس', 5);
        wordToNumber.set('ستة', 6); wordToNumber.set('ست', 6);
        wordToNumber.set('سبعة', 7); wordToNumber.set('سبع', 7);
        wordToNumber.set('ثمانية', 8); wordToNumber.set('ثمان', 8);
        wordToNumber.set('تسعة', 9); wordToNumber.set('تسع', 9);
        wordToNumber.set('عشرة', 10); wordToNumber.set('عشر', 10);
        
        // أعداد 11-19
        wordToNumber.set('أحد عشر', 11); wordToNumber.set('احد عشر', 11);
        wordToNumber.set('اثنا عشر', 12); wordToNumber.set('اثني عشر', 12);
        wordToNumber.set('ثلاثة عشر', 13); wordToNumber.set('ثلاث عشر', 13);
        wordToNumber.set('أربعة عشر', 14); wordToNumber.set('اربعة عشر', 14);
        wordToNumber.set('خمسة عشر', 15); wordToNumber.set('خمس عشر', 15);
        wordToNumber.set('ستة عشر', 16); wordToNumber.set('ست عشر', 16);
        wordToNumber.set('سبعة عشر', 17); wordToNumber.set('سبع عشر', 17);
        wordToNumber.set('ثمانية عشر', 18); wordToNumber.set('ثمان عشر', 18);
        wordToNumber.set('تسعة عشر', 19); wordToNumber.set('تسع عشر', 19);

        // العشرات
        wordToNumber.set('عشرون', 20); wordToNumber.set('عشرين', 20);
        wordToNumber.set('ثلاثون', 30); wordToNumber.set('ثلاثين', 30);
        wordToNumber.set('أربعون', 40); wordToNumber.set('أربعين', 40);
        wordToNumber.set('خمسون', 50); wordToNumber.set('خمسين', 50);
        wordToNumber.set('ستون', 60); wordToNumber.set('ستين', 60);
        wordToNumber.set('سبعون', 70); wordToNumber.set('سبعين', 70);
        wordToNumber.set('ثمانون', 80); wordToNumber.set('ثمانين', 80);
        wordToNumber.set('تسعون', 90); wordToNumber.set('تسعين', 90);

        // المئات
        wordToNumber.set('مئة', 100); wordToNumber.set('مائة', 100);
        wordToNumber.set('مئتان', 200); wordToNumber.set('مائتان', 200); wordToNumber.set('مائتين', 200);
        wordToNumber.set('ثلاثمائة', 300); wordToNumber.set('ثلاث مئة', 300); wordToNumber.set('ثلاثمئة', 300);
        wordToNumber.set('أربعمائة', 400); wordToNumber.set('أربع مئة', 400);
        wordToNumber.set('خمسمائة', 500); wordToNumber.set('خمس مئة', 500);
        wordToNumber.set('ستمائة', 600); wordToNumber.set('ست مئة', 600);
        wordToNumber.set('سبعمائة', 700); wordToNumber.set('سبع مئة', 700);
        wordToNumber.set('ثمانمائة', 800); wordToNumber.set('ثمان مئة', 800);
        wordToNumber.set('تسعمائة', 900); wordToNumber.set('تسع مئة', 900);
        
        // الآلاف والمليون
        wordToNumber.set('ألف', 1000); wordToNumber.set('الف', 1000);
        wordToNumber.set('ألفان', 2000); wordToNumber.set('ألفين', 2000);
        wordToNumber.set('ثلاثة آلاف', 3000); wordToNumber.set('ثلاث الاف', 3000);
        wordToNumber.set('أربعة آلاف', 4000); wordToNumber.set('خمسة آلاف', 5000);
        wordToNumber.set('مليون', 1000000); wordToNumber.set('مليونان', 2000000);

        function tokenizeArabic(text) {
            let normalized = text.replace(/[^\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF\s\d]/g, '');
            let words = normalized.split(/\s+/).filter(w => w.length > 0);
            let merged = [];
            for (let i = 0; i < words.length; i++) {
                if (i+1 < words.length && (words[i] === 'أحد' || words[i] === 'احد' || words[i] === 'اثنا' || words[i] === 'ثلاثة' || words[i] === 'أربعة' || words[i] === 'خمسة' || words[i] === 'ستة' || words[i] === 'سبعة' || words[i] === 'ثمانية' || words[i] === 'تسعة') && words[i+1] === 'عشر') {
                    merged.push(words[i] + ' ' + words[i+1]);
                    i++;
                } 
                else if (words[i] === 'ثلاث' && i+1 < words.length && words[i+1] === 'آلاف') {
                    merged.push('ثلاثة آلاف');
                    i++;
                }
                else if (words[i] === 'أربعة' && i+1 < words.length && words[i+1] === 'آلاف') {
                    merged.push('أربعة آلاف');
                    i++;
                }
                else if (words[i] === 'خمسة' && i+1 < words.length && words[i+1] === 'آلاف') {
                    merged.push('خمسة آلاف');
                    i++;
                }
                else {
                    merged.push(words[i]);
                }
            }
            return merged;
        }

        function parseAmountFromSpeech(spokenText) {
            if (!spokenText) return null;
            let text = spokenText.toLowerCase();
            const directNumberMatch = text.match(/\b\d+\b/);
            if (directNumberMatch) {
                return parseInt(directNumberMatch[0], 10);
            }
            
            const tokens = tokenizeArabic(text);
            let total = 0;
            let current = 0;
            
            for (let i = 0; i < tokens.length; i++) {
                let token = tokens[i];
                let value = null;
                if (wordToNumber.has(token)) {
                    value = wordToNumber.get(token);
                } 
                else if (token === 'ثلاث' && i+1 < tokens.length && (tokens[i+1] === 'مئة' || tokens[i+1] === 'مائة')) {
                    value = 300;
                    i++;
                }
                else if (token === 'أربع' && i+1 < tokens.length && (tokens[i+1] === 'مئة' || tokens[i+1] === 'مائة')) {
                    value = 400;
                    i++;
                }
                else if (token === 'خمس' && i+1 < tokens.length && (tokens[i+1] === 'مئة' || tokens[i+1] === 'مائة')) {
                    value = 500;
                    i++;
                }
                else if (token === 'ست' && i+1 < tokens.length && (tokens[i+1] === 'مئة' || tokens[i+1] === 'مائة')) {
                    value = 600;
                    i++;
                }
                else if (token === 'سبع' && i+1 < tokens.length && (tokens[i+1] === 'مئة' || tokens[i+1] === 'مائة')) {
                    value = 700;
                    i++;
                }
                else if (token === 'ثمان' && i+1 < tokens.length && (tokens[i+1] === 'مئة' || tokens[i+1] === 'مائة')) {
                    value = 800;
                    i++;
                }
                else if (token === 'تسع' && i+1 < tokens.length && (tokens[i+1] === 'مئة' || tokens[i+1] === 'مائة')) {
                    value = 900;
                    i++;
                }
                else if ((token === 'آلاف' || token === 'ألف' || token === 'الف') && current > 0 && current < 1000) {
                    total += current * 1000;
                    current = 0;
                    continue;
                }
                else if (token === 'مليون' && current > 0 && current < 1000) {
                    total += current * 1000000;
                    current = 0;
                    continue;
                }
                
                if (value !== null) {
                    if (value >= 100 && value < 1000) {
                        if (value === 100 || value === 200 || value === 300 || value === 400 || value === 500 || value === 600 || value === 700 || value === 800 || value === 900) {
                            current = value;
                        } else {
                            if (current === 0) current = value;
                            else current = current * value;
                        }
                    } 
                    else if (value >= 1000) {
                        if (current === 0) total += value;
                        else {
                            total += current * value;
                            current = 0;
                        }
                    }
                    else {
                        current += value;
                    }
                } 
                else if (token === 'و' || token === 'ريال' || token === 'درهم' || token === 'دولار') {
                    continue;
                } 
                else {
                    if (current > 0) {
                        total += current;
                        current = 0;
                    }
                }
            }
            if (current > 0) total += current;
            return total > 0 ? total : null;
        }

        function extractAmountAndNotes(fullText) {
            if (!fullText || fullText.trim() === "") return { amount: null, notes: "" };
            let detectedAmount = parseAmountFromSpeech(fullText);
            let notes = fullText.trim();
            if (detectedAmount !== null && detectedAmount > 0) {
                let tempText = fullText;
                const words = fullText.split(/\s+/);
                let numericWordsIndices = [];
                for (let i = 0; i < words.length; i++) {
                    let w = words[i];
                    let testPhrase = w;
                    if (i+1 < words.length && (w === 'أحد' || w === 'اثنا' || w === 'ثلاثة' || w === 'أربعة' || w === 'خمسة' || w === 'ستة' || w === 'سبعة' || w === 'ثمانية' || w === 'تسعة') && words[i+1] === 'عشر') {
                        testPhrase = w + ' ' + words[i+1];
                    }
                    if (wordToNumber.has(testPhrase) || (wordToNumber.has(w) && wordToNumber.get(w) >= 100) || w === 'ألف' || w === 'الف' || w === 'مليون') {
                        numericWordsIndices.push(i);
                        if (testPhrase.includes(' ')) i++;
                    }
                    else if (w === 'ريال' || w === 'درهم') numericWordsIndices.push(i);
                }
                let filteredWords = [...words];
                for (let idx of numericWordsIndices.reverse()) {
                    if (idx < filteredWords.length) filteredWords.splice(idx, 1);
                }
                let cleanedNotes = filteredWords.join(' ').replace(/\s+/g, ' ').trim();
                if (cleanedNotes.length === 0 && detectedAmount !== null) {
                    let simpler = fullText.replace(new RegExp(`\\b(${Array.from(wordToNumber.keys()).join('|')})\\b`, 'gi'), '').replace(/ريال|درهم|دولار/gi, '').replace(/\s+/g, ' ').trim();
                    notes = simpler || "تم إضافة المبلغ فقط";
                } else {
                    notes = cleanedNotes || "ملاحظة (تلقائية)";
                }
                notes = notes.replace(/ريال|درهم|عملة/gi, '').replace(/\s+/g, ' ').trim();
                if(notes === "") notes = "—";
            } else {
                notes = fullText;
            }
            return { amount: detectedAmount, notes: notes };
        }
        
        // ----------------------------------------------
        // 2. إدارة الصوت والإذن المتقدم
        // ----------------------------------------------
        const amountField = document.getElementById('amountInput');
        const notesField = document.getElementById('notesInput');
        const micBtn = document.getElementById('micBtn');
        const clearBtn = document.getElementById('clearBtn');
        const exampleBtn = document.getElementById('exampleBtn');
        const recognizedSpan = document.getElementById('recognizedText');
        const statusArea = document.getElementById('statusArea');
        
        let recognition = null;
        let isListening = false;
        let permissionGranted = false;
        
        // دعم Web Speech API
        const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
        const isSpeechSupported = SpeechRecognitionAPI !== undefined;
        
        // دالة طلب الإذن بشكل استباقي باستخدام getUserMedia (للتأكد من صلاحية الميكروفون)
        async function requestMicrophonePermission() {
            if (!isSpeechSupported) {
                updateStatus("⚠️ متصفحك لا يدعم التعرف الصوتي. استخدم Chrome أو Edge أو Safari.", true);
                micBtn.disabled = true;
                return false;
            }
            try {
                // طلب إذن الميكروفون بشكل صريح
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                // إذا نجح، أغلق المسارات فوراً (لا نحتاج البث، فقط الإذن)
                stream.getTracks().forEach(track => track.stop());
                permissionGranted = true;
                updateStatus("✅ صلاحية الميكروفون متاحة. يمكنك البدء.", false);
                micBtn.disabled = false;
                return true;
            } catch (err) {
                console.error("Microphone permission error:", err);
                let errorMsg = "";
                if (err.name === "NotAllowedError" || err.name === "PermissionDeniedError") {
                    errorMsg = "❌ لم يتم منح صلاحية الميكروفون. الرجاء السماح يدوياً من إعدادات المتصفح ثم أعد تحميل الصفحة.";
                } else if (err.name === "NotFoundError") {
                    errorMsg = "❌ لا يوجد ميكروفون متصل بجهازك.";
                } else {
                    errorMsg = `❌ خطأ في الوصول للميكروفون: ${err.message}`;
                }
                updateStatus(errorMsg, true);
                micBtn.disabled = true;
                permissionGranted = false;
                return false;
            }
        }
        
        function initRecognition() {
            if (!isSpeechSupported) return null;
            const recog = new SpeechRecognitionAPI();
            recog.continuous = false;
            recog.interimResults = false;
            recog.lang = 'ar-SA';
            recog.maxAlternatives = 1;
            return recog;
        }
        
        function updateStatus(message, isError = false) {
            statusArea.innerHTML = `<div class="listening-badge" style="background: ${isError ? '#ffe0e0' : '#e6f7e6'}; color: ${isError ? '#aa2e2e' : '#2e7d32'};">🎙️ ${message}</div>`;
            setTimeout(() => {
                if (statusArea.innerHTML.includes(message) && !isListening) {
                    // لا نمسح الرسالة إذا كانت خطأ دائم أو رسالة نجاح بعد فترة
                    if (!isError && message.includes("متاحة")) return;
                    if (isError) return;
                    statusArea.innerHTML = '';
                }
            }, 3000);
        }
        
        function fillFormFromSpeech(transcript) {
            recognizedSpan.innerText = transcript;
            const { amount, notes } = extractAmountAndNotes(transcript);
            if (amount !== null && !isNaN(amount)) {
                amountField.value = amount;
            } else {
                amountField.value = '';
                if(transcript.trim() !== "") updateStatus(`⚠️ لم يتم التعرف على مبلغ واضح. تم وضع النص في الملاحظات.`, true);
            }
            if (notes && notes.trim() !== "" && notes !== "—") {
                notesField.value = notes;
            } else if (transcript && amount === null) {
                notesField.value = transcript;
            } else if (notes === "—" && amount !== null) {
                notesField.value = "";
            }
            if(amount === null && (!notes || notes === transcript)) {
                notesField.value = transcript;
            }
        }
        
        async function startListening() {
            if (!isSpeechSupported) {
                alert("التعرف الصوتي غير مدعوم في هذا المتصفح.");
                return;
            }
            // التأكد من الإذن قبل البدء
            if (!permissionGranted) {
                const granted = await requestMicrophonePermission();
                if (!granted) {
                    updateStatus("لا يمكن البدء بدون صلاحية الميكروفون. امنح الإذن ثم حاول مجدداً.", true);
                    return;
                }
            }
            if (isListening) return;
            // إعادة إنشاء recognition في كل مرة لضمان حالة نظيفة
            if (recognition) {
                try { recognition.abort(); } catch(e) {}
            }
            recognition = initRecognition();
            if (!recognition) {
                updateStatus("فشل تهيئة التعرف الصوتي.", true);
                return;
            }
            
            // إعداد معالجات الأحداث
            recognition.onresult = (event) => {
                const last = event.results.length - 1;
                const transcript = event.results[last][0].transcript.trim();
                if (transcript) {
                    updateStatus("✅ تم التعرف على النص بنجاح!");
                    fillFormFromSpeech(transcript);
                } else {
                    recognizedSpan.innerText = "(لم يتم التعرف على كلام)";
                    updateStatus("❌ لم يتم سماع أي نص، حاول مرة أخرى.", true);
                }
                stopListening();
            };
            
            recognition.onerror = (event) => {
                console.error("Speech error", event.error);
                let msg = "";
                if (event.error === 'not-allowed') {
                    msg = "تم رفع إذن الميكروفون أو تم رفضه. تحقق من إعدادات المتصفح.";
                    permissionGranted = false;
                }
                else if (event.error === 'no-speech') msg = "لم يتم اكتشاف كلام، حاول مجدداً.";
                else if (event.error === 'audio-capture') msg = "لم يتم العثور على ميكروفون أو تم حجبه.";
                else msg = `خطأ: ${event.error}`;
                updateStatus(`❌ ${msg}`, true);
                stopListening();
            };
            
            recognition.onend = () => {
                if (isListening) stopListening();
            };
            
            try {
                recognition.start();
                isListening = true;
                updateStatus("⏳ استمع الآن... تحدث بوضوح (مثال: ألف ريال مقابل ماء وسجارة)");
                micBtn.style.background = "linear-gradient(125deg, #b91c1c, #dc2626)";
                micBtn.querySelector('span:last-child').innerText = "جاري الاستماع...";
            } catch (err) {
                console.error("Failed to start recognition:", err);
                updateStatus("تعذر بدء التعرف الصوتي. حاول تحديث الصفحة.", true);
                stopListening();
            }
        }
        
        function stopListening() {
            if (recognition && isListening) {
                try {
                    recognition.stop();
                } catch(e) {}
            }
            isListening = false;
            micBtn.style.background = "linear-gradient(125deg, #0f2b3d, #1c4e6f)";
            micBtn.querySelector('span:last-child').innerText = "إضغط وتحدث (مايك)";
        }
        
        // أحداث الأزرار
        micBtn.addEventListener('click', async () => {
            if (isListening) {
                stopListening();
                if(recognition) recognition.abort();
            } else {
                await startListening();
            }
        });
        
        clearBtn.addEventListener('click', () => {
            amountField.value = '';
            notesField.value = '';
            recognizedSpan.innerText = '—';
            updateStatus("✨ تم مسح الحقول", false);
        });
        
        exampleBtn.addEventListener('click', () => {
            const exampleText = "ألف ريال مقابل ماء وسجارة";
            recognizedSpan.innerText = exampleText + " (تجريبي)";
            fillFormFromSpeech(exampleText);
            updateStatus("📌 تم تطبيق مثال توضيحي", false);
        });
        
        // عند تحميل الصفحة، نطلب الإذن بشكل استباقي (اختياري ولكن مفيد)
        (async function autoRequestPermission() {
            if (isSpeechSupported) {
                // نطلب الإذن بدون إزعاج المستخدم كثيراً، لكن نعرض رسالة هادئة
                updateStatus("🔄 جارٍ التحقق من صلاحية الميكروفون...", false);
                await requestMicrophonePermission();
            } else {
                updateStatus("متصفحك لا يدعم التعرف الصوتي. استخدم Chrome أو Edge.", true);
                micBtn.disabled = true;
            }
        })();
    })();
</script>
</body>
</html>
