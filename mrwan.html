<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>لوحة القيادة | نظام الحسابات والإدارة</title>
    <!-- Google Fonts: خط حديث وجميل (Cairo) يناسب العربية -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (أيقونات احترافية) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #eef2f7 0%, #d9e2ec 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }

        /* خلفية زخرفية خفيفة (دائرة ضبابية) */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(52, 102, 153, 0.08);
            border-radius: 50%;
            top: 10%;
            left: -5%;
            z-index: 0;
        }
        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(36, 83, 120, 0.05);
            border-radius: 50%;
            bottom: 5%;
            right: -8%;
            z-index: 0;
        }

        /* بطاقة المحتوى الرئيسية */
        .dashboard-card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(0px);
            border-radius: 48px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 4px 12px rgba(0, 0, 0, 0.05);
            padding: 2.5rem 2rem;
            max-width: 1000px;
            width: 100%;
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.5);
            position: relative;
            z-index: 2;
        }

        /* الترويسة + الشعار */
        .header {
            margin-bottom: 3rem;
        }
        .icon-main {
            font-size: 3.8rem;
            color: #1e466e;
            background: #e8f0fe;
            width: 90px;
            height: 90px;
            line-height: 90px;
            text-align: center;
            border-radius: 30px;
            margin: 0 auto 1.2rem;
            box-shadow: 0 8px 14px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-main i {
            font-size: 3.2rem;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            color: #0a2b44;
            letter-spacing: -0.3px;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            font-size: 1rem;
            font-weight: 500;
            color: #4a627a;
            border-bottom: 2px solid #cfdfed;
            display: inline-block;
            padding-bottom: 6px;
        }

        /* شبكة الأزرار الاحترافية */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.8rem;
            margin: 2.5rem 0 1rem;
        }

        /* تصميم الأزرار على شكل بطاقات قابلة للنقر */
        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            background: #ffffff;
            padding: 2rem 1rem;
            border-radius: 36px;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.08);
            border: 1px solid #e9edf2;
            cursor: pointer;
            color: #1e3a5f;
        }

        .action-btn:hover {
            transform: translateY(-8px);
            box-shadow: 0 22px 30px -12px rgba(0, 0, 0, 0.2);
            border-color: #bbd4f0;
            background: #fefefe;
        }

        .action-btn:active {
            transform: translateY(-2px);
            transition: 0.05s;
        }

        /* أيقونات الأزرار كبيرة وواضحة */
        .btn-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            transition: transform 0.2s;
        }

        .action-btn:hover .btn-icon {
            transform: scale(1.05);
        }

        .btn-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.2px;
        }

        .btn-desc {
            font-size: 0.85rem;
            color: #5f7d9c;
            font-weight: 500;
            opacity: 0.85;
        }

        /* لون خاص بكل زر (اختياري ولكن أنيق) */
        .btn-customers .btn-icon { color: #2c6e9e; }
        .btn-customers:hover { border-bottom: 4px solid #2c6e9e; }

        .btn-debts .btn-icon { color: #2a7f6e; }
        .btn-debts:hover { border-bottom: 4px solid #2a7f6e; }

        .btn-reports .btn-icon { color: #b4653a; }
        .btn-reports:hover { border-bottom: 4px solid #b4653a; }

        /* تذييل بسيط */
        .footer-note {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #6f8aac;
            background: #f1f6fd;
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            font-weight: 500;
        }

        /* تحسين للهواتف */
        @media (max-width: 700px) {
            body {
                padding: 1rem;
            }
            .dashboard-card {
                padding: 1.8rem 1.2rem;
            }
            h1 {
                font-size: 1.7rem;
            }
            .btn-title {
                font-size: 1.2rem;
            }
            .btn-icon {
                font-size: 2.8rem;
            }
            .buttons-grid {
                gap: 1.2rem;
            }
        }

        /* تأثير اهتزاز خفيف للنقر (اختياري) */
        @keyframes gentleClick {
            0% { transform: scale(1); }
            50% { transform: scale(0.97); }
            100% { transform: scale(1); }
        }
        .clicked {
            animation: gentleClick 0.2s ease;
        }
    </style>
</head>
<body>

<div class="dashboard-card">
    <div class="header">
        <div class="icon-main">
            <i class="fas fa-chart-line"></i>
        </div>
        <h1>نظام إدارة الحسابات <span style="color:#266e9e;">والعملاء</span></h1>
        <div class="subtitle">
            <i class="fas fa-cog" style="font-size: 0.8rem;"></i> لوحة التحكم المركزية
        </div>
    </div>

    <div class="buttons-grid">
        <!-- زر 1: تعريف العملاء -> sot_amel.html -->
        <a href="sot_amel.html" class="action-btn btn-customers" id="btn-customers">
            <div class="btn-icon">
                <i class="fas fa-users"></i>
            </div>
            <div class="btn-title">تعريف العملاء</div>
            <div class="btn-desc">إدارة بيانات العملاء / الموردين</div>
        </a>

        <!-- زر 2: الحساب والديون -> sot_add_hsabat.html (تم إضافة .html لضمان التوافق) -->
        <a href="sot_add_hsabat.html" class="action-btn btn-debts" id="btn-debts">
            <div class="btn-icon">
                <i class="fas fa-hand-holding-usd"></i>
            </div>
            <div class="btn-title">الحساب والديون</div>
            <div class="btn-desc">أرصدة، دفعات، استحقاقات</div>
        </a>

        <!-- زر 3: الكشوفات والتقارير -> sot_ksf_hsabat.html -->
        <a href="sot_ksf_hsabat.html" class="action-btn btn-reports" id="btn-reports">
            <div class="btn-icon">
                <i class="fas fa-file-invoice"></i>
            </div>
            <div class="btn-title">الكشوفات والتقارير</div>
            <div class="btn-desc">قوائم مالية / تقارير مفصلة</div>
        </a>
    </div>

    <div class="footer-note">
        <i class="fas fa-arrow-left"></i> اختر الخدمة المناسبة  <i class="fas fa-rocket" style="margin-right: 6px;"></i>
    </div>
</div>

<!-- سكريبت صغير لإضافة تأثير نقر مرن وتأكيد توفر الملفات (تنبيه ودي في حال كانت الصفحات غير موجودة) 
     هذا لا يمنع التنقل بل ينبه المطور/المستخدم بشكل لطيف أثناء التطوير، ويمكن إزالته في الإنتاج، 
     لكنه يجعل التجربة احترافية أكثر -->
<script>
    (function() {
        // الحصول على جميع الأزرار (عناصر الـ action-btn)
        const btns = document.querySelectorAll('.action-btn');
        
        // دالة لإضافة تأثير click أنيميشن
        function addClickAnimation(element) {
            element.classList.add('clicked');
            setTimeout(() => {
                element.classList.remove('clicked');
            }, 200);
        }
        
        // معالجة التنقل مع فحص اختياري (لكن لا نمنع الانتقال الأساسي)
        // نضيف حدث النقر لإضافة الأنيميشن فقط، والتنقل طبيعي من خلال href
        btns.forEach(btn => {
            btn.addEventListener('click', function(e) {
                // إضافة التأثير الحركي
                addClickAnimation(this);
                
                // اختياري: يمكن التحقق من وجود الملفات عن طريق fetch (ولكن قد يسبب تأخير أو مشكلة CORS)
                // بدلاً من ذلك نعطي تنبيه وهمي أن الصفحات سيتم فتحها، لكن لا نعترض على التنقل الأساسي 
                // هذا مجرد إضافة احترافية للمستخدم.
                // لكن لا نمنع السلوك الافتراضي، نترك الرابط يعمل.
                // نضيف فقط إشارة "جاري التوجيه" في console.log للمطور
                let targetUrl = this.getAttribute('href');
                console.log(`🚀 توجيه إلى: ${targetUrl}`);
                
                // (اختياري) للمستخدم: في حال كان الملف غير موجود وحدث خطأ 404، يظهر تنبيه ودود عن بعد
                // لا نريد تعطيل التجربة، لكن نضيف event listener لخطأ الصفحة غير موجودة على مستوى window?
                // الحل الأمثل: المستخدم سيرى خطأ 404 في المتصفح، لكن يمكننا عرض رسالة توجيهية لطيفة باستخدام beforeunload? 
                // بدلاً من تعقيد الأمور نستخدم fetch خفيف جداً فقط لفحص الوجود (اختياري تنبيه احترافي)
                // هذا ليس إلزامياً ولكنه يضيف جودة احترافية ويجنب المستخدم رابط مقطوع.
                // نستخدم fetch بسيط (مع إلغاء متابعة الطلب إذا فشل لعدم التأثير على التنقل)
                // لكن fetch قد يسبب مشكلة cors على بعض الملفات المحلية، لكنه يعمل بنسبة كبيرة.
                // للتأكد من تجربة سلسة: ننفذ fetch بحذر ولا نمنع الانتقال.
                // إذا أردنا إعلام المستخدم بشكل هادئ: نستخدم try/catch ونعرض رسالة في حال فشل الحمل 
                // لكن أفضل لا نعترض، بل نضيف فقط توجيه.
                // نضيف ميزة: إذا كان الملف غير موجود نعرض رسالة سريعة (مثل أداة مساعدة).
                // لكن بما أن السيناريو حقيقي وقد تكون الصفحات موجودة بالفعل، نضيف فقط تنبيه غير مزعج في وضع التطوير.
                // لضمان عرض رسالة لطيفة للمستخدم النهائي (إذا لم توجد الصفحة حقاً)
                // ولكن لا نريد إلغاء الانتقال الأصلي، لذلك نضيف log فقط.
                // -------------------------------------------------
                // ميزة إضافية احترافية: عرض رسالة "جاري التحميل..." خفيفة لثانية؟
                // يمكن عمل عنصر منبثق غير متطفل.
            });
        });
        
        // للتأكد من أن جميع أسماء الملفات المطلوبة صحيحة (هذا سكريبت تطويري تعليمي)
        // دون التأثير على التنقل الحقيقي.
        // يقوم بفحص بسيط (اختياري) يساعد المطور على معرفة إن كان الملف موجوداً قبل التنقل الفعلي.
        // يتم التنفيذ فقط عند تحميل الصفحة: للتأكد من أن الروابط تشير إلى ملفات، وهذا للتوثيق.
        const requiredPages = [
            { name: "تعريف العملاء", url: "sot_amel.html" },
            { name: "الحساب والديون", url: "sot_add_hsabat.html" },
            { name: "الكشوفات والتقارير", url: "sot_ksf_hsabat.html" }
        ];
        
        // هذه الدالة للفحص الخلفي (للمطور) ولكنها لا تمنع أي شيء، فقط تعرض حالة الروابط في console.
        async function gentleFileCheck() {
            for (let page of requiredPages) {
                try {
                    const response = await fetch(page.url, { method: 'HEAD', cache: 'no-cache' });
                    if (!response.ok && response.status !== 404) {
                        // بعض الخوادم ترجع 200 حتى لملفات غير موجودة، نستخدم status نصي؟ الأفضل عدم إزعاج المستخدم.
                        // فقط console.log للمطور
                        console.warn(`⚠️ صفحة "${page.name}" (${page.url}) قد لا تكون متاحة (HTTP ${response.status})`);
                    } else if (response.ok) {
                        console.log(`✅ صفحة "${page.name}" (${page.url}) موجودة`);
                    } else {
                        console.warn(`❓ صفحة "${page.name}" (${page.url}) لم يتم العثور عليها، تأكد من وجود الملف في نفس المسار`);
                    }
                } catch (err) {
                    console.warn(`🔍 تعذر فحص ${page.url} بسبب CORS أو الشبكة. لكن الرابط سيحاول العمل بشكل طبيعي.`);
                }
            }
        }
        // ننفذ الفحص بعد تحميل الصفحة بهدوء (لا يؤثر على المستخدم)
        if (window.location.protocol !== 'file:') {
            // في حالة فتح الصفحة محلياً (file://) قد تمنع fetch CORS، ولكن لا مشكلة
            gentleFileCheck().catch(()=>{});
        } else {
            console.log("تم فتح الصفحة محلياً (بروتوكول file://) - تخطي فحص الشبكة.");
        }
    })();
</script>
</body>
</html>
